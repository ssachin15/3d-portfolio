<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0f1b2e; }
    .panel { fill: #1a2847; }
    .endpoint-box { fill: #1a3a3a; }
    .success { fill: #10b981; }
    .warning { fill: #f59e0b; }
    .error { fill: #ef4444; }
    .header-text { font-family: 'Courier New', monospace; font-size: 16px; fill: #e0e0e0; font-weight: bold; }
    .method-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #e0e0e0; font-weight: bold; }
    .path-text { font-family: 'Courier New', monospace; font-size: 9px; fill: #22d3ee; }
    .label-text { font-family: Arial, sans-serif; font-size: 9px; fill: #808080; font-weight: bold; }
    .status-text { font-family: 'Courier New', monospace; font-size: 9px; fill: #e0e0e0; }
    .response-text { font-family: 'Courier New', monospace; font-size: 8px; fill: #a0a0a0; }
    .accent-text { font-family: Arial, sans-serif; font-size: 11px; fill: #22d3ee; font-weight: bold; }
    .border-line { stroke: #2a3d5f; stroke-width: 0.5; fill: none; }
  </style>
  
  <!-- Main background -->
  <rect width="600" height="400" class="bg"/>
  
  <!-- Header panel -->
  <rect x="10" y="10" width="580" height="35" class="panel"/>
  <text x="20" y="30" class="header-text">Job Tracker API Server</text>
  <text x="480" y="30" class="accent-text">Node.js</text>
  
  <!-- Status bar -->
  <rect x="10" y="50" width="580" height="18" fill="#0f2a1a"/>
  <circle cx="25" cy="59" r="4" class="success"/>
  <text x="35" y="62" class="status-text">Connected to MongoDB • Port 5000 • Running</text>
  
  <!-- Endpoints section -->
  <text x="20" y="85" class="label-text">API ENDPOINTS</text>
  <line x1="10" y1="88" x2="590" y2="88" class="border-line"/>
  
  <!-- Endpoint 1: GET /jobs -->
  <rect x="20" y="100" width="260" height="28" class="endpoint-box" rx="3"/>
  <rect x="25" y="105" width="35" height="18" class="success" rx="2"/>
  <text x="28" y="117" class="method-text">GET</text>
  <text x="65" y="117" class="path-text">/api/jobs</text>
  <text x="220" y="117" class="status-text">200</text>
  
  <!-- Endpoint 2: POST /jobs -->
  <rect x="300" y="100" width="280" height="28" class="endpoint-box" rx="3"/>
  <rect x="305" y="105" width="40" height="18" fill="#3b82f6" rx="2"/>
  <text x="307" y="117" class="method-text">POST</text>
  <text x="350" y="117" class="path-text">/api/jobs</text>
  <text x="520" y="117" class="status-text">201</text>
  
  <!-- Endpoint 3: PUT /jobs/:id -->
  <rect x="20" y="135" width="260" height="28" class="endpoint-box" rx="3"/>
  <rect x="25" y="140" width="35" height="18" fill="#f59e0b" rx="2"/>
  <text x="28" y="152" class="method-text">PUT</text>
  <text x="65" y="152" class="path-text">/api/jobs/:id</text>
  <text x="220" y="152" class="status-text">200</text>
  
  <!-- Endpoint 4: DELETE /jobs/:id -->
  <rect x="300" y="135" width="280" height="28" class="endpoint-box" rx="3"/>
  <rect x="305" y="140" width="40" height="18" class="error" rx="2"/>
  <text x="307" y="152" class="method-text">DEL</text>
  <text x="350" y="152" class="path-text">/api/jobs/:id</text>
  <text x="520" y="152" class="status-text">204</text>
  
  <!-- Database section -->
  <text x="20" y="190" class="label-text">DATABASE</text>
  <line x1="10" y1="193" x2="590" y2="193" class="border-line"/>
  
  <!-- DB Connection -->
  <rect x="20" y="205" width="270" height="50" fill="#1a3a2e" rx="3"/>
  <text x="30" y="218" class="accent-text">MongoDB Collections</text>
  <text x="30" y="232" class="response-text">• jobs (156 docs)</text>
  <text x="30" y="243" class="response-text">• applications (428 docs)</text>
  
  <!-- Request/Response -->
  <rect x="310" y="205" width="270" height="50" fill="#2a1a3a" rx="3"/>
  <text x="320" y="218" class="accent-text">Latest Request</text>
  <text x="320" y="232" class="response-text">GET /api/jobs?status=pending</text>
  <text x="320" y="243" class="response-text">Response: 2.4ms • 45 records</text>
  
  <!-- Footer stats -->
  <line x1="10" y1="270" x2="590" y2="270" class="border-line"/>
  <text x="20" y="290" class="label-text">SERVER STATS</text>
  
  <!-- Stats boxes -->
  <rect x="20" y="305" width="130" height="35" fill="#0f2a0f" rx="3"/>
  <text x="30" y="318" class="label-text">REQUESTS</text>
  <text x="90" y="328" class="accent-text">2,847</text>
  
  <rect x="165" y="305" width="130" height="35" fill="#0a2a3a" rx="3"/>
  <text x="175" y="318" class="label-text">UPTIME</text>
  <text x="220" y="328" class="accent-text">18d 5h</text>
  
  <rect x="310" y="305" width="130" height="35" fill="#2a1a0f" rx="3"/>
  <text x="320" y="318" class="label-text">AVG RESPONSE</text>
  <text x="360" y="328" class="accent-text">2.1ms</text>
  
  <rect x="455" y="305" width="135" height="35" fill="#1a1a2a" rx="3"/>
  <text x="465" y="318" class="label-text">USERS ACTIVE</text>
  <text x="530" y="328" class="accent-text">127</text>
  
  <!-- Status indicator -->
  <circle cx="30" cy="375" r="3" class="success"/>
  <text x="40" y="378" class="response-text">API Status: Healthy</text>
  
  <!-- Accent circles -->
  <circle cx="550" cy="30" r="25" fill="#22d3ee" opacity="0.08"/>
</svg>